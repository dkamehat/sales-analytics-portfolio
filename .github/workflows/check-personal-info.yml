name: Personal Info Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  check-patterns:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for personal/business information patterns
        run: |
          set -euo pipefail

          # SELF_EXCLUDE_BEGIN — pattern definitions (excluded from self-scan)
          PATTERNS=(
            "kamehata"
            "kamekichii"
            "Daiki Kamehata"
            "亀畑"
            "demae"
            "Demae-can"
            "出前館"
            "デマエカン"
            "Rakuten Payment"
            "Amazon Business Japan"
            "Otaru University"
            "KOMOJU"
            "Sakana AI"
            "Sansan"
            "SmartHR"
            "Anthropic CSM"
            "立石"
            "藤田"
            "君塚"
            "熊久保"
            "二宮"
            "山田"
            "山本"
            "根岸"
            "芦川"
            "横川"
            "お店価格"
            "PJ-W"
            "kamekichii.banana"
            "60,000 merchants"
            "60K merchants"
            "105 sales reps"
            "BEGIN RSA PRIVATE KEY"
            "BEGIN OPENSSH PRIVATE KEY"
          )
          # SELF_EXCLUDE_END

          # Files to scan: everything except this workflow + the hook
          FILES=$(git ls-files \
              | grep -v -E '^\.githooks/pre-commit$' \
              | grep -v -E '^\.github/workflows/check-personal-info\.yml$' \
              | grep -v -E '^docs/PRE-PUBLISH-CHECKLIST\.md$' \
              | grep -v -E '^HOSTING\.md$')

          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            [[ -z "$pattern" ]] && continue
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              [[ ! -f "$file" ]] && continue
              if grep -li -e "$pattern" "$file" >/dev/null 2>&1; then
                FOUND=1
                echo "::error file=$file::Personal/business info pattern detected: '$pattern'"
                grep -in -e "$pattern" "$file" | head -3 | sed 's/^/    /'
              fi
            done <<< "$FILES"
          done

          if [[ "$FOUND" == "1" ]]; then
            echo ""
            echo "❌ Found personal/business information in repository content."
            echo "   Remove or anonymize these patterns before pushing."
            echo "   See docs/PRE-PUBLISH-CHECKLIST.md."
            exit 1
          fi

          echo "✓ No personal/business info patterns detected."

      - name: Check for high-risk file types
        run: |
          set -euo pipefail
          DANGER_FILES=$(git ls-files | grep -E '(^|/)(\.env(\..+)?|\.wrangler/|.*\.sqlite|.*\.sqlite-journal|\.claude/settings\.local\.json|CLAUDE\.md)$' || true)
          if [[ -n "$DANGER_FILES" ]]; then
            echo "❌ Dangerous files committed to repository:"
            echo "$DANGER_FILES"
            echo "These typically contain secrets or local state. Remove from git history."
            exit 1
          fi
          echo "✓ No high-risk file types committed."
